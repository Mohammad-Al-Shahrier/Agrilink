<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgriLink</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <h2 class="logo">🌱 AgriLink</h2>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="login.html">Sign In</a>
    <a href="register.html" class="btn">Sign Up</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Fresh & Organic Vegetables 🥬</h1>
  <p>Farm to Home | 100% Natural & Chemical Free</p>
  <a href="#productList" class="hero-btn">🌿 Shop Now</a>
</section>

<!-- SEARCH -->
<input type="text" id="search" placeholder="🔍 Search fresh products...">

<!-- FARMER PANEL -->
<div id="farmerPanel" class="farmer-panel">
  <h2>Add Product 🧑‍🌾</h2>
  <input type="text" id="pname" placeholder="Product Name">
  <input type="number" id="pprice" placeholder="Price">
  <input type="file" id="pimage">
  <button onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCTS -->
<div id="productList" class="grid"></div>

<!-- FOOTER -->
<footer>
  <p>© 2026 AgriLink | Smart Agriculture 🌱</p>
</footer>

<script src="script.js"></script>
</body>
</html>
