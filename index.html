<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgriLink</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <h2 class="logo" onclick="goHome()">🌱 AgriLink</h2>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="pages/login.html">Sign In</a>
    <a href="pages/register.html" class="btn">Sign Up</a>
  </div>
</nav>

<section class="hero">
  <h1>Fresh & Organic Vegetables 🥬</h1>
  <p>Farm to Home | 100% Natural & Chemical Free</p>
  <a href="#productList" class="hero-btn">🌿 Shop Now</a>
</section>

<input type="text" id="search" placeholder="🔍 Search fresh products...">

<div id="farmerPanel" class="farmer-panel">
  <h2>Add Product 🧑‍🌾</h2>
  <input type="text" id="pname" placeholder="Product Name">
  <input type="number" id="pprice" placeholder="Price">
  <input type="file" id="pimage">
  <button onclick="addProduct()">Add Product</button>
</div>

<div id="productList" class="grid"></div>

<footer>
  <p>© 2026 AgriLink | Smart Agriculture 🌱</p>
</footer>

<script src="js/product.js"></script>
<script src="js/app.js"></script>

</html>
