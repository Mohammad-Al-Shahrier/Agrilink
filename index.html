<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriLink</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<!-- ✅ UPDATED NAVBAR -->
<nav class="navbar">
  <h2 class="logo" onclick="goHome()">🌱 AgriLink</h2>

  <div class="nav-links" id="navLinks">
    

    <!-- Guest -->
    <span id="guestLinks">
      <a href="pages/login.html">Sign In</a>
      <a href="pages/register.html" class="btn">Sign Up</a>
    </span>

    <!-- Logged-in User -->
    <span id="userLinks" class="hidden">
      <a href="pages/profile.html">Profile</a>
      <a href="pages/dashboard.html">Dashboard</a>
      <a href="#">Settings</a>
      <a href="#">Cart</a>
      <a href="#" onclick="logout()">Logout</a>
    </span>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main>

  <!-- HERO -->
  <section class="hero">
    <h1>Fresh & Organic Vegetables 🥬</h1>
    <p>Farm to Home | 100% Natural & Chemical Free</p>
  </section>

  <!-- SEARCH -->
  <div class="search-box">
    <input type="text" id="search" placeholder="🔍 Search fresh products...">
  </div>

  <!-- FARMER PANEL -->
  <div id="farmerPanel" class="farmer-panel hidden">
    <h2>Add Product 🧑‍🌾</h2>

    <form id="productForm">
      <input type="text" id="pname" placeholder="Product Name" required>
      <input type="number" id="pprice" placeholder="Price" required>
      <input type="file" id="pimage" required>

      <button type="submit">Add Product</button>
    </form>
  </div>

  <!-- PRODUCTS -->
  <div id="productList" class="products"></div>

</main>

<!-- FOOTER -->
<footer>
  <p>© 2026 AgriLink | Smart Agriculture 🌱</p>
</footer>

<!-- JS -->
<script src="js/storage.js"></script>
<script src="js/product.js"></script>
<script src="js/app.js"></script>

</body>
</html>
